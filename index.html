<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Quiz Avanzado: Núcleo, Membrana y Nutrición</title>

<style>
body {
  font-family: Arial;
  text-align:center;
  background: linear-gradient(45deg,#1e0033,#6a00ff,#9c27b0);
  color:white;
}

.caja {
  background:white;
  color:black;
  padding:20px;
  border-radius:15px;
  max-width:650px;
  margin:40px auto;
}

h1 { margin-bottom:10px; }

button {
  display:block;
  margin:10px auto;
  padding:12px;
  border:none;
  border-radius:10px;
  width:85%;
  cursor:pointer;
  font-weight:bold;
}

.correcta { background:green; color:white }
.incorrecta { background:red; color:white }
</style>
</head>

<body>

<div class="caja">
<h1>🧠 Quiz: Núcleo, Membrana y Nutrición Celular</h1>
<h2 id="pregunta"></h2>
<p id="tiempo"></p>
<div id="opciones"></div>
<p id="explicacion"></p>
</div>

<script>

const preguntas = [

{p:"¿Cuál es la función principal del núcleo?",o:["Producción de energía","Control celular","Movimiento"],c:"Control celular",e:"El núcleo dirige las actividades y contiene el ADN."},

{p:"¿Qué molécula contiene la información genética?",o:["ARN","Proteínas","ADN"],c:"ADN",e:"El ADN guarda la información hereditaria."},

{p:"¿Dónde se encuentra el ADN en eucariotas?",o:["Citoplasma","Núcleo","Membrana"],c:"Núcleo",e:"Está protegido dentro del núcleo."},

{p:"¿Qué forma la cromatina al dividirse la célula?",o:["Ribosomas","Cromosomas","Proteínas"],c:"Cromosomas",e:"La cromatina se compacta en cromosomas."},

{p:"¿Qué función tiene el nucléolo?",o:["Respiración","Producción de ribosomas","Movimiento"],c:"Producción de ribosomas",e:"Produce componentes necesarios para ribosomas."},

{p:"¿Qué característica tiene la membrana plasmática?",o:["Impermeable","Selectiva","Rígida"],c:"Selectiva",e:"Permite el paso de algunas sustancias."},

{p:"¿De qué está formada la membrana?",o:["ADN","Bicapa de fosfolípidos","Proteínas únicamente"],c:"Bicapa de fosfolípidos",e:"Está formada por fosfolípidos con proteínas."},

{p:"¿Qué tipo de transporte no usa energía?",o:["Activo","Pasivo","Endocitosis"],c:"Pasivo",e:"No requiere ATP."},

{p:"¿Cómo se llama el paso de agua?",o:["Difusión","Ósmosis","Respiración"],c:"Ósmosis",e:"Es difusión de agua a través de membrana."},

{p:"¿Qué transporte usa proteínas para pasar sustancias?",o:["Difusión simple","Facilitada","Ósmosis"],c:"Facilitada",e:"Usa proteínas de membrana."},

{p:"¿Qué transporte requiere energía?",o:["Pasivo","Activo","Ósmosis"],c:"Activo",e:"Se produce contra el gradiente y usa ATP."},

{p:"¿Qué ocurre en el transporte activo?",o:["Mayor a menor","Menor a mayor","Igual"],c:"Menor a mayor",e:"Va contra gradiente de concentración."},

{p:"¿Cómo ingresan partículas grandes a la célula?",o:["Difusión","Endocitosis","Ósmosis"],c:"Endocitosis",e:"La membrana engloba las partículas."},

{p:"¿Cómo salen sustancias de la célula?",o:["Endocitosis","Exocitosis","Difusión"],c:"Exocitosis",e:"Se liberan por vesículas."},

{p:"¿Qué tipo de endocitosis incorpora sólidos?",o:["Pinocitosis","Fagocitosis","Ósmosis"],c:"Fagocitosis",e:"Engloba partículas grandes."},

{p:"¿Qué organela realiza la fotosíntesis?",o:["Mitocondria","Cloroplasto","Núcleo"],c:"Cloroplasto",e:"Convierte luz en energía química."},

{p:"¿Qué organela produce energía celular?",o:["Cloroplasto","Mitocondria","Núcleo"],c:"Mitocondria",e:"Realiza respiración celular."},

{p:"¿Qué tipo de nutrición produce su propio alimento?",o:["Heterótrofa","Autótrofa","Mixta"],c:"Autótrofa",e:"Propia de plantas."},

{p:"¿Qué proceso convierte glucosa en energía?",o:["Fotosíntesis","Respiración celular","Difusión"],c:"Respiración celular",e:"Produce ATP."},

{p:"¿Qué explica la teoría endosimbiótica?",o:["Origen de procariotas","Origen de eucariotas","Fotosíntesis"],c:"Origen de eucariotas",e:"Explica cómo surgieron mitocondrias y cloroplastos."}

];

let i=0, tiempo=8, fase="jugar";

function cargar(){
let p=preguntas[i];
document.getElementById("pregunta").innerText=p.p;
document.getElementById("explicacion").innerText="";
let div=document.getElementById("opciones");
div.innerHTML="";
p.o.forEach(op=>{
let b=document.createElement("button");
b.innerText=op;
b.onclick=()=>elegir(op);
div.appendChild(b);
});
}

function elegir(op){
if(fase!="jugar")return;
fase="respuesta";
let p=preguntas[i];
document.querySelectorAll("button").forEach(b=>{
if(b.innerText===p.c)b.className="correcta";
if(b.innerText===op && op!==p.c)b.className="incorrecta";
});
document.getElementById("explicacion").innerText="✅ "+p.c+" — "+p.e;
tiempo=10;
}

setInterval(()=>{
document.getElementById("tiempo").innerText="⏱ "+tiempo+" s";
if(tiempo==0){
if(fase=="jugar")elegir("");
else{ i=(i+1)%preguntas.length; fase="jugar"; cargar(); }
tiempo=10;
}
tiempo--;
},1000);

cargar();

</script>

</body>
</html>
